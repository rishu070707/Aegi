{% extends "base.html" %}

{% block title %}EVIDENCE LOG | SENTINEL ALPHA{% endblock %}

{% block content %}
<div class="h-[calc(100vh-64px)] flex flex-col bg-slate-950 p-10 overflow-hidden">
  <!-- Dynamic Header -->
  <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-12 gap-8 shrink-0">
    <div class="space-y-2">
      <div class="flex items-center gap-3">
        <span class="w-3 h-12 bg-emerald-500"></span>
        <h1 class="text-6xl font-headline font-black tracking-tighter text-on-surface uppercase">Evidence Archive</h1>
      </div>
      <p class="text-slate-400 font-mono text-xs tracking-widest uppercase pl-6 opacity-60">Synchronized_Neural_Interception_Log // v4.2.0_STABLE</p>
    </div>
    
    <div class="flex flex-wrap gap-3">
      <button class="px-6 py-3 bg-emerald-500 text-slate-950 text-xs font-black tracking-[0.2em] rounded-sm uppercase hover:bg-emerald-400 transition-all">All_Intercepts</button>
      <button class="px-6 py-3 bg-slate-900 border border-white/5 text-slate-400 text-xs font-bold tracking-[0.2em] rounded-sm uppercase hover:text-white transition-all">Handguns</button>
      <button class="px-6 py-3 bg-slate-900 border border-white/5 text-slate-400 text-xs font-bold tracking-[0.2em] rounded-sm uppercase hover:text-white transition-all">Knives</button>
      <button id="refreshLogs" class="p-3 bg-slate-900 border border-emerald-500/30 text-emerald-500 rounded-sm hover:bg-emerald-500/10 transition-all">
        <span class="material-symbols-outlined">refresh</span>
      </button>
    </div>
  </div>

  <!-- High-Impact Grid -->
  <div id="logsGrid" class="flex-1 overflow-y-auto grid grid-cols-1 lg:grid-cols-2 gap-12 pr-6 custom-scrollbar">
    <!-- Entries populated via JS -->
    <div class="col-span-full py-60 flex flex-col items-center justify-center">
      <div class="w-24 h-24 border-4 border-emerald-500/20 border-t-emerald-500 rounded-full animate-spin mb-8"></div>
      <p class="font-mono text-lg text-emerald-500 uppercase tracking-[0.5em] animate-pulse">SYNCHRONIZING_DATABASE...</p>
    </div>
  </div>

  <!-- Status Footer -->
  <div class="mt-10 flex justify-between items-center bg-slate-900/50 backdrop-blur-md p-6 border border-white/5 shrink-0">
    <div class="flex items-center gap-6">
      <div class="flex items-baseline gap-2">
        <span class="text-slate-500 font-mono text-[10px] tracking-widest uppercase">INTERCEPT_COUNT:</span>
        <span id="logCount" class="text-3xl font-headline font-black text-emerald-500">0</span>
      </div>
      <div class="h-8 w-[1px] bg-white/10"></div>
      <div class="flex items-center gap-2 text-emerald-500/50 text-[10px] font-mono tracking-widest uppercase">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
        Link_Stable
      </div>
    </div>
    
    <div class="flex gap-4">
      <button class="w-12 h-12 flex items-center justify-center bg-slate-900 border border-white/5 rounded-sm hover:bg-slate-800 transition-all">
        <span class="material-symbols-outlined text-slate-500">chevron_left</span>
      </button>
      <div class="w-12 h-12 flex items-center justify-center bg-emerald-500/10 border border-emerald-500 text-emerald-500 font-black font-headline">1</div>
      <button class="w-12 h-12 flex items-center justify-center bg-slate-900 border border-white/5 rounded-sm hover:bg-slate-800 transition-all">
        <span class="material-symbols-outlined text-slate-500">chevron_right</span>
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadLogs() {
    const grid = document.getElementById('logsGrid');
    try {
      const res = await fetch('/evidence');
      const logs = await res.json();
      document.getElementById('logCount').textContent = logs.length;

      if (logs.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full py-60 flex flex-col items-center justify-center opacity-30">
            <span class="material-symbols-outlined text-9xl mb-6">folder_open</span>
            <p class="font-mono text-xl uppercase tracking-[0.3em]">NO_LOGS_IN_BUFFER</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = logs.map(l => {
        const riskClass = (l.risk_level === 'High') ? 'bg-red-500 text-white' : (l.risk_level === 'Medium' ? 'bg-amber-500 text-slate-950' : 'bg-emerald-500 text-slate-950');
        const ts = new Date(l.timestamp).toLocaleString();
        const fname = l.frame_file || l.image_file;
        const id = l.id || l.frame_file || 'EVID-UNNK';
        const className = l.class_name || l.class || 'Unknown';
        
        return `
          <div class="group relative bg-slate-900 rounded-sm overflow-hidden border border-white/10 hover:border-emerald-500 transition-all duration-500 shadow-2xl flex flex-col min-h-[500px]">
            <!-- Large Image Viewport -->
            <div class="relative h-[320px] overflow-hidden bg-black shrink-0 border-b border-white/5">
              <img class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" src="/evidence/${fname}" />
              <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent opacity-60"></div>
              
              <!-- Floating Risk HUD -->
              <div class="absolute top-6 left-6 ${riskClass} px-4 py-2 text-xs font-black font-headline tracking-[0.2em] uppercase shadow-2xl">
                ${l.risk_level || 'Medium'}_RISK_DETECTED
              </div>
              
              <!-- BBox HUD -->
              <div class="absolute bottom-6 right-6 font-mono text-[10px] text-emerald-400 bg-slate-950/80 px-3 py-1.5 border border-emerald-500/30 backdrop-blur-md">
                SEGMENT: [${(l.bbox || []).map(b => Math.round(b)).join(',')}]
              </div>
            </div>
            
            <!-- Contextual Data Area -->
            <div class="p-10 flex-1 flex flex-col justify-between">
              <div>
                <div class="flex justify-between items-start mb-6">
                  <div class="space-y-1">
                    <p class="text-[10px] font-mono text-slate-500 tracking-[0.3em] font-bold">#SEQ-${id.slice(0,12).toUpperCase()}</p>
                    <h3 class="text-4xl font-headline font-black text-white uppercase tracking-tighter">${className} IDENTIFIED</h3>
                  </div>
                  <a href="/evidence/${fname}" download class="w-14 h-14 flex items-center justify-center bg-slate-800 text-emerald-400 rounded-sm hover:bg-emerald-500 hover:text-slate-950 transition-all shadow-xl">
                    <span class="material-symbols-outlined text-2xl">download</span>
                  </a>
                </div>
                
                <div class="h-[2px] w-full bg-white/5 mb-8 overflow-hidden">
                  <div class="h-full bg-emerald-500/50 w-0 group-hover:w-full transition-all duration-700 delay-100"></div>
                </div>
              </div>
              
              <div class="grid grid-cols-2 gap-12">
                <div class="space-y-2">
                  <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em]">Confidence_Index</p>
                  <p class="text-4xl font-headline font-black text-emerald-400 italic">${((l.confidence || 0)*100).toFixed(1)}%</p>
                </div>
                <div class="space-y-2">
                  <p class="text-[11px] font-bold text-slate-500 uppercase tracking-[0.2em]">Capture_UTC</p>
                  <p class="font-mono text-sm text-slate-300 leading-tight">${ts}</p>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

    } catch (e) {
      console.error(e);
    }
  }

  document.getElementById('refreshLogs').onclick = loadLogs;
  loadLogs();
</script>
{% endblock %}
